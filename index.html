<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style: none;
            text-decoration: none;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
        }
        nav{
            height: 70px;
            width: 100%;
            padding: 0px 50px;
            background-color: black;
            display: flex;
            justify-content: space-between;
            align-items: center;

        }
        h1{
            font-size: 25px;
            font-weight: 500;
            color: white;
        }
        ul{
            display: flex;
            gap:40px;
            align-items: center;
        }
        ul li a {
            color: white;
        }
        button{
            padding: 5px 10px;
            background-color: beige;
            color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid lightgray;
            font-size: 17px;
            transition: all 0.3s ease-in-out;
        }
        button:hover{
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body>
    


      <nav>
        <h1>hammad</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contant</a></li>
            <li><a href="#">Blog</a></li>
        </ul>
       <div class="btn">
         <button>Hire Me</button>
       </div>
      </nav>

</body>
</html>
